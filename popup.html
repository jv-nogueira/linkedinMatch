<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Coincide a descrição</title>
  <style>
    body {
      width: 280px;
      font-family: Arial, sans-serif;
      text-align: center;
      padding: 15px;
      background-color: #fff;
    }
    input {
      width: 100%;
      padding: 8px;
      border: 1px solid #ccc;
      border-radius: 4px;
      margin-top: 10px;
    }
    button {
      width: 100%;
      padding: 10px;
      margin-top: 10px;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      color: white;
      font-weight: bold;
    }
    #startBtn { background-color: #0d6efd; }
    #stopBtn { background-color: #dc3545; display: none; }
  </style>
</head>
<body>
  <h3>Coincide a descrição</h3>
  <input id="keywords" type="text" placeholder="Palavras-chave separadas por vírgula" />
  <button id="startBtn">Iniciar verificação</button>
  <button id="stopBtn">Parar execução</button>
  <script src="popup.js"></script>
</body>
</html>
