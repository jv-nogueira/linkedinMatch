<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Coincide a descrição</title>
  <!-- Bootstrap CSS -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    body {
      width: 100%;
      min-width: 400px;
      max-width: 450px;
      font-family: Arial, sans-serif;
      padding: 15px;
      background-color: #fff;
    }
    h3 {
      text-align: center;
      margin-bottom: 20px;
    }
    .form-check {
      text-align: left;
      margin-top: 10px;
    }
    #keywords {
      resize: vertical; /* Permite expandir a textarea */
    }
    button {
      font-weight: bold;
    }
  </style>
</head>
<body>
  <div class="container">
    <h3>Match no LinkedIn</h3>
    
    <div class="mb-3">
      <textarea id="keywords" class="form-control" rows="2" placeholder="Palavras-chave separadas por vírgula"></textarea>
    </div>
    
    <div class="form-check mb-3">
      <input class="form-check-input" type="checkbox" id="saveAll" disabled>
      <label class="form-check-label" for="saveAll">
        Salvar as vagas que não contêm palavra-chave?
      </label>
    </div>
    
    <div class="d-grid gap-2">
      <button id="startBtn" class="btn btn-primary">Iniciar verificação</button>
      <button id="stopBtn" class="btn btn-danger" style="display:none;">Parar execução</button>
    </div>
  </div>

  <!-- Bootstrap JS Bundle -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
  <script src="popup.js"></script>
</body>
</html>
